version="3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: thestudio-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: loyalty_db
      POSTGRES_USER: loyalty_user
      POSTGRES_PASSWORD: loyalty_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
